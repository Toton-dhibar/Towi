# NOTE: Placeholder assets are included to allow CI builds.
# For a functional APK, replace app/src/main/assets/rootfs.7z with:
# https://github.com/Toton-dhibar/Towi/releases/download/original/rootfs.7z
---
name: Build APK

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android

      - name: Cache cargo-xdk
        id: cache-cargo-xdk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-xdk
          key: ${{ runner.os }}-cargo-xdk-2.12.6

      - name: Install cargo-xdk
        if: steps.cache-cargo-xdk.outputs.cache-hit != 'true'
        run: cargo install cargo-xdk

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare CI rootfs assets
        run: |
          mkdir -p app/src/main/assets
          if [ ! -f app/src/main/assets/rootfs.7z ]; then
            touch app/src/main/assets/rootfs.7z
          fi
          if [ ! -f app/src/main/assets/rom.ini ]; then
            {
              echo "author=github-actions"
              echo "version=ci-placeholder"
              echo "code=0"
              echo "desc=placeholder asset for CI build"
            } > app/src/main/assets/rom.ini
          fi

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: twoyi-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
